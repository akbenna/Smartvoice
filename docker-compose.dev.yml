# =============================================================================
# AI-Consultassistent — Docker Compose DEVELOPMENT (macOS / geen GPU)
# =============================================================================
# Voor ontwikkeling op MacBook (Apple Silicon of Intel).
# Ollama draait NATIVE op macOS (niet in Docker) — installeer via ollama.com
# Whisper draait op CPU (trager, maar werkt).
#
# Gebruik:
#   1. Installeer Ollama: https://ollama.com/download
#   2. ollama pull llama3.1:8b
#   3. cp .env.example .env && pas aan
#   4. docker compose -f docker-compose.dev.yml up -d
#   5. SEED_ON_START=true python scripts/seed_production.py
#   6. uvicorn services.api.main:app --reload --port 8000
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-consultassistent}
      POSTGRES_USER: ${POSTGRES_USER:-ca_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ca_app} -d ${POSTGRES_DB:-consultassistent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (event bus + cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ca-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devredis} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # GEEN Ollama container — draait native op macOS
  # Installeer: https://ollama.com/download
  # Model: ollama pull llama3.1:8b
  # ---------------------------------------------------------------------------

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
