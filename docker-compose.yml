# =============================================================================
# AI-Consultassistent — Docker Compose (Productie — Lokale GPU Server)
# =============================================================================
# Gebruik: docker compose up -d
# Vereist: NVIDIA Container Toolkit voor GPU-services
#
# Eerste keer:
#   1. cp .env.example .env && pas waarden aan
#   2. docker compose up -d postgres redis ollama
#   3. docker compose exec ollama ollama pull llama3.1:8b
#   4. docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (event bus + cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ca-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Ollama — Lokale LLM runtime (GPU)
  # ---------------------------------------------------------------------------
  # Draait Llama 3.3 8B lokaal voor medische extractie, SOEP en detectie.
  # Model wordt eenmalig gepulled: docker compose exec ollama ollama pull llama3.1:8b
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ca-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # API Gateway (FastAPI + Whisper STT + PyAnnote)
  # ---------------------------------------------------------------------------
  # Bevat de volledige pipeline: Audio -> Whisper -> LLM extractie -> SOEP
  # Whisper en PyAnnote draaien in-process (GPU gedeeld met Ollama).
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: ca-api
    restart: unless-stopped
    env_file: .env
    environment:
      # Ollama draait als Docker service, niet op host
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - audio_data:/data/audio
      - audit_data:/data/audit
      - model_cache:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Frontend (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend/review-app
      dockerfile: Dockerfile
    container_name: ca-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: AI-Consultassistent
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_models:
    driver: local
  audio_data:
    driver: local
  audit_data:
    driver: local
  model_cache:
    driver: local
